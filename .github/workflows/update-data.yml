name: Update Climate Data

on:
  schedule:
    # Run daily at 6 AM UTC (same as Render cron)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure CDS API credentials
        run: |
          mkdir -p ~/.config/cdsapi
          cat > ~/.cdsapirc << EOF
          url: ${{ secrets.CDS_URL }}
          key: ${{ secrets.CDS_KEY }}
          EOF

      - name: Update data and generate images
        env:
          CDS_API_KEY: ${{ secrets.CDS_KEY }}
          CDS_API_URL: ${{ secrets.CDS_URL }}
        run: |
          python run.py update --force

      - name: Update ERA5 spatial data (current month)
        run: |
          python -c "
          from src.precompute_monthly_stats import download_current_month_mtd, precompute_current_month
          download_current_month_mtd(force=True)
          precompute_current_month()
          "
        continue-on-error: true   # Don't fail the whole workflow if CDS is slow/unavailable

      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git commit -m "Daily data update $(date -u +'%Y-%m-%d')"
          git push
