# Render Blueprint - Infrastructure as Code
# https://render.com/docs/blueprint-spec

services:
  # Web service for the dashboard
  - type: web
    name: climate-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:server --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120 --preload
    plan: starter          # upgrade from free to enable persistent disk
    autoDeploy: true
    disk:
      name: era5-data
      mountPath: /opt/render/project/src/data/era5
      sizeGB: 3            # holds maps (~827MB) + NetCDFs (1.35GB) + stats CSV
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: DEBUG
        value: "false"

  # Cron job — global pipeline only (no CDS, no spatial; ephemeral container)
  - type: cron
    name: climate-data-updater
    runtime: python
    buildCommand: pip install -r requirements.txt
    schedule: "0 6 * * *"  # Run daily at 6 AM UTC
    startCommand: python run.py update --force
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
